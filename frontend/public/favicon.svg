<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    
    <!-- Stylized S Gradient -->
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>

    <!-- Document Stroke Gradient -->
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>
  </defs>

  <!-- Background Circle (Premium Dark Mode Icon Base) -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Document Outline (Adobe-style Minimal Page) -->
  <path d="M160 112h144l96 96v192c0 26.5-21.5 48-48 48H160c-26.5 0-48-21.5-48-48V160c0-26.5 21.5-48 48-48z" 
        fill="none" 
        stroke="url(#docGrad)" 
        stroke-width="20" 
        stroke-linejoin="round" />
  
  <!-- Document Fold -->
  <path d="M304 112v96h96" 
        fill="none" 
        stroke="url(#docGrad)" 
        stroke-width="20" 
        stroke-linejoin="round" />

  <!-- Stylized "S" Signature Stroke overlaying the document -->
  <!-- Represents a signature pen stroke flowing in the shape of an S -->
  <path d="M200 220 c30-40, 80-30, 80 10 c0 30-50 40-70 60 c-30 30-20 70, 20 80 c40 10, 80-20, 80-40" 
        fill="none" 
        stroke="url(#sGrad)" 
        stroke-width="32" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Signature Ending Dot/Spark -->
  <circle cx="310" cy="330" r="14" fill="#F43F5E" />
</svg>