<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .symbol-filled {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Subtle background pattern for executive feel */
        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(0,0,0,0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(0,0,0,0.03) 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-md bg-grid-pattern antialiased">
<!-- Main Container -->
<main class="w-full max-w-[440px] flex flex-col gap-xl">
<!-- Header / Brand -->
<div class="text-center flex flex-col items-center gap-sm">
<div class="flex items-center justify-center w-12 h-12 bg-primary rounded text-on-primary mb-2">
<span class="material-symbols-outlined symbol-filled text-[24px]">draw</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface">SignFlow</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Secure access to your enterprise workspace</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-xl shadow-[0_4px_6px_-1px_rgba(0,0,0,0.1),0_2px_4px_-1px_rgba(0,0,0,0.06)] flex flex-col gap-lg relative overflow-hidden">
<!-- Top Accent Line -->
<div class="absolute top-0 left-0 w-full h-1 bg-primary"></div>
<form class="flex flex-col gap-md">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<input class="bg-[#F8FAFC] border border-outline-variant rounded px-md py-sm font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-[#3B82F6] focus:ring-2 focus:ring-[#3B82F6]/20 transition-all placeholder:text-outline" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-md text-label-md text-secondary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full bg-[#F8FAFC] border border-outline-variant rounded px-md py-sm font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-[#3B82F6] focus:ring-2 focus:ring-[#3B82F6]/20 transition-all placeholder:text-outline pr-10" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors flex items-center justify-center p-1" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="mt-sm bg-[#0F172A] text-white font-label-md text-label-md py-sm px-lg rounded flex items-center justify-center gap-sm hover:bg-black transition-colors relative group overflow-hidden border border-transparent hover:border-outline-variant/30" type="submit">
<div class="absolute inset-0 border border-white/10 rounded pointer-events-none"></div>
                    Sign In
                    <span class="material-symbols-outlined text-[16px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-md">
<div class="flex-1 h-px bg-outline-variant/50"></div>
<span class="font-label-md text-label-md text-on-surface-variant">OR CONTINUE WITH</span>
<div class="flex-1 h-px bg-outline-variant/50"></div>
</div>
<!-- SSO Options -->
<button class="bg-surface-container-lowest border border-[#E2E8F0] text-on-surface font-label-md text-label-md py-sm px-lg rounded flex items-center justify-center gap-sm hover:bg-surface-container-low transition-colors shadow-[0_1px_2px_rgba(0,0,0,0.05)]" type="button">
<svg class="w-4 h-4" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path><path d="M1 1h22v22H1z" fill="none"></path></svg>
                Google Workspace
            </button>
<button class="bg-surface-container-lowest border border-[#E2E8F0] text-on-surface font-label-md text-label-md py-sm px-lg rounded flex items-center justify-center gap-sm hover:bg-surface-container-low transition-colors shadow-[0_1px_2px_rgba(0,0,0,0.05)]" type="button">
<svg class="w-4 h-4" viewbox="0 0 21 21" xmlns="http://www.w3.org/2000/svg"><path d="M10.5 0C4.7 0 0 4.7 0 10.5S4.7 21 10.5 21 21 16.3 21 10.5 16.3 0 10.5 0zm5.6 15L10 11.4V4.5h1.5v6.1l5.3 3.2-.7 1.2z" fill="#000000"></path></svg>
                Single Sign-On (SAML)
            </button>
</div>
<!-- Trust Signals / Footer -->
<div class="flex flex-col items-center gap-xs">
<div class="flex items-center gap-xs text-outline">
<span class="material-symbols-outlined text-[16px]">lock</span>
<span class="font-mono-sm text-mono-sm">256-bit encrypted connection</span>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant text-center mt-sm">
                By signing in, you agree to the <a class="text-secondary hover:underline" href="#">Terms of Service</a> and <a class="text-secondary hover:underline" href="#">Privacy Policy</a>.
            </p>
</div>
</main>
</body></html>
